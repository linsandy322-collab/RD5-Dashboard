<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 安全標頭：Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://unpkg.com https://script.google.com https://script.googleusercontent.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' https: data:;
        connect-src 'self' https://script.google.com https://script.googleusercontent.com;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    ">
    
    <!-- 安全標頭：防止點擊劫持 -->
    <meta http-equiv="X-Frame-Options" content="DENY">
    <!--test-->>
    
    <!-- 安全標頭：防止 MIME 類型嗅探 -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    <!-- 安全標頭：XSS 保護 -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    
    <!-- 安全標頭：Referrer Policy -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <title>RD6產品開發進度戰情室</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin="anonymous" referrerpolicy="no-referrer" onerror="var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';document.head.appendChild(s);"></script>
    <style>
        :root {
            --primary: #1a3a6e;
            --primary-dark: #0f2247;
            --secondary: #b8960c;
            --success: #1a6b42;
            --warning: #b8860b;
            --danger: #8b1a1a;
            --gray-50: #faf8f4;
            --gray-100: #f0ece4;
            --gray-200: #dcd6cb;
            --gray-300: #c0b8aa;
            --gray-600: #6b5f52;
            --gray-700: #4a4038;
            --gray-800: #2d2520;
            --gray-900: #1a1510;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(160deg, #0c1929 0%, #152444 50%, #1a2e5a 100%);
            min-height: 100vh;
            padding: 2rem;
            color: var(--gray-900);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(250, 248, 244, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(184, 150, 12, 0.3);
            border-top: 3px solid #b8960c;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #1a3a6e 0%, #b8960c 60%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .upload-section {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .btn {
            background: linear-gradient(135deg, #1a3a6e, #0f2247);
            color: #f0e8cc;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
            border: 1px solid rgba(184, 150, 12, 0.4);
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 0.95rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(184, 150, 12, 0.35);
            border-color: #b8960c;
            background: linear-gradient(135deg, #1e4480, #1a3a6e);
        }

        .btn-success {
            background: linear-gradient(135deg, #1a6b42, #0f4a2d);
        }

        .btn-warning {
            background: linear-gradient(135deg, #b8860b, #8b6508);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .data-source-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--gray-600);
            margin-bottom: 1rem;
        }

        .source-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .source-google {
            background: #e8f0e4;
            color: #1a5c2e;
        }

        .source-excel {
            background: #e6ecf7;
            color: #1a3a6e;
        }

        .toolbar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: 'Noto Sans TC', sans-serif;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 58, 110, 0.12);
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-600);
        }

        .filter-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        select {
            padding: 0.75rem 1rem;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        select:hover {
            border-color: var(--primary);
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 58, 110, 0.12);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(184, 150, 12, 0.25);
            border-radius: 50%;
            border-top-color: var(--secondary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(250, 248, 244, 0.97);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid rgba(184, 150, 12, 0.25);
            animation: fadeIn 0.6s ease-out;
            animation-fill-mode: both;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--gray-600);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            font-family: 'Space Mono', monospace;
        }

        .category-section {
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        .category-header {
            background: linear-gradient(135deg, #1a3a6e, #0f2247);
            backdrop-filter: blur(10px);
            padding: 1rem 1.5rem;
            border-radius: 16px 16px 0 0;
            margin-bottom: 0;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.35);
            border-left: 4px solid #b8960c;
        }

        .category-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f0e8cc;
            letter-spacing: 0.02em;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            background: rgba(15, 34, 71, 0.3);
            padding: 1.5rem;
            border-radius: 0 0 16px 16px;
        }

        .product-card {
            background: #faf8f4;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border-top: 2px solid rgba(184, 150, 12, 0.2);
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(184, 150, 12, 0.3);
        }

        .card-header {
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
            border-bottom: 2px solid var(--gray-100);
        }

        .product-image {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 12px;
            background: var(--gray-50);
            padding: 0.5rem;
        }

        .product-info {
            flex: 1;
        }

        .product-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--gray-900);
        }

        .product-desc {
            font-size: 0.9rem;
            color: var(--gray-600);
            margin-bottom: 0.75rem;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .priority-tag {
            padding: 0.35rem 0.75rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .priority-緊急 { background: #f5e0e0; color: #7a1515; border: 1px solid #c9a0a0; }
        .priority-重要 { background: #f5edda; color: #7a5208; border: 1px solid #c9b080; }
        .priority-一般 { background: #dce6f5; color: #1a3a6e; border: 1px solid #a0b8d8; }
        .priority-次要 { background: #e8e6f0; color: #3a3570; border: 1px solid #b0acd0; }
        .priority-暫停 { background: #ede8e0; color: #5a5040; border: 1px solid #c0b8a8; }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            background: var(--gray-100);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .release-date {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--primary);
        }

        .owner-badges {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .owner-badge {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .progress-section {
            padding: 0.85rem 1.25rem;
            background: var(--gray-50);
        }

        .progress-bar-container {
            position: relative;
            height: 44px;
            margin-bottom: 0.5rem;
        }

        .progress-track {
            position: absolute;
            top: 18px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gray-200);
            border-radius: 2px;
        }

        .progress-fill {
            position: absolute;
            top: 18px;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #1a3a6e, #b8960c, #d4af37);
            border-radius: 2px;
            transition: width 0.6s ease;
        }

        .progress-nodes {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
        }

        .progress-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }

        .node-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--gray-300);
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .node-dot.active {
            background: #b8960c;
            width: 12px;
            height: 12px;
            box-shadow: 0 0 6px rgba(184, 150, 12, 0.5);
        }

        .node-label {
            font-size: 0.75rem;
            color: var(--gray-600);
            font-weight: 600;
            white-space: nowrap;
        }

        .node-label.active {
            color: var(--gray-900);
        }

        .history-section {
            padding: 1rem 1.5rem;
            max-height: 280px;
            overflow-y: auto;
        }

        .history-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--gray-200);
            font-size: 0.9rem;
            color: var(--gray-700);
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(250, 248, 244, 0.97);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            border-top: 3px solid rgba(184, 150, 12, 0.4);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--gray-900);
        }

        .empty-state p {
            color: var(--gray-600);
            margin-bottom: 1.5rem;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--gray-100);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-400);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-500);
        }

        .owner-tracker {
            background: rgba(250, 248, 244, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-left: 4px solid #b8960c;
        }

        .owner-tracker-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 1rem;
        }

        .owner-cards-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
        }

        .owner-update-card {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.6rem 0.9rem;
            background: var(--gray-50);
            border-radius: 12px;
            border-left: 4px solid;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .owner-update-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .owner-update-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .owner-update-name {
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--gray-800);
            white-space: nowrap;
        }

        .owner-update-date {
            font-size: 0.75rem;
            font-family: 'Space Mono', monospace;
            color: var(--gray-600);
            margin-top: 0.1rem;
            white-space: nowrap;
        }

        .owner-update-days {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.2rem 0.55rem;
            border-radius: 6px;
            white-space: nowrap;
            margin-left: 0.25rem;
        }

        .owner-tooltip {
            position: fixed;
            background: #faf8f4;
            border-radius: 12px;
            padding: 0.85rem 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28);
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.15s ease;
            min-width: 210px;
            border-top: 3px solid #b8960c;
        }

        .owner-tooltip.visible {
            opacity: 1;
        }

        .owner-tooltip-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--gray-900);
            margin-bottom: 0.55rem;
        }

        .owner-tooltip-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.82rem;
            color: var(--gray-700);
            margin-top: 0.3rem;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            h1 { font-size: 1.75rem; }
            .header-top { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .upload-section { flex-wrap: wrap; width: 100%; }
            .cards-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div>
                    <h1>🎯 RD6產品開發進度戰情室</h1>
                </div>
                <div class="upload-section">
                    <button onclick="reloadGoogleSheets()" class="btn btn-warning" id="reloadBtn">
                        🔄 重新載入
                    </button>
                    <div class="file-input-wrapper">
                        <input type="file" id="excelFile" accept=".xlsx,.xls" onchange="handleFileUpload(event)">
                        <label for="excelFile" class="btn">
                            📁 上傳 Excel 檔案
                        </label>
                    </div>
                    <button onclick="downloadTemplate()" class="btn btn-success">
                        📥 下載範本
                    </button>
                </div>
            </div>
            
            <div class="data-source-info">
                <span>資料來源：</span>
                <span class="source-badge" id="sourceIndicator">載入中...</span>
            </div>
            
            <div class="toolbar">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="搜尋產品名稱或編號..." onkeyup="filterProducts()">
                </div>
                <div class="filter-group">
                    <select id="categoryFilter" onchange="filterProducts()">
                        <option value="">全部類別</option>
                    </select>
                    <select id="progressFilter" onchange="filterProducts()">
                        <option value="">全部進度</option>
                        <option value="進行中">進行中</option>
                        <option value="已上市">已上市</option>
                    </select>
                    <select id="priorityFilter" onchange="filterProducts()">
                        <option value="">全部優先權</option>
                        <option value="緊急">緊急</option>
                        <option value="重要">重要</option>
                        <option value="一般">一般</option>
                        <option value="次要">次要</option>
                        <option value="暫停">暫停</option>
                    </select>
                    <select id="statusFilter" onchange="filterProducts()">
                        <option value="">全部狀態</option>
                        <option value="研發">研發</option>
                        <option value="樣品">樣品</option>
                        <option value="洽詢">洽詢</option>
                        <option value="發售">發售</option>
                        <option value="停產">停產</option>
                        <option value="暫停出貨">暫停出貨</option>
                    </select>
                    <select id="stageFilter" onchange="filterProducts()">
                        <option value="">全部階段</option>
                        <!-- 產品階段 -->
                        <option value="規劃">規劃</option>
                        <option value="研發">研發</option>
                        <option value="驗証">驗証</option>
                        <option value="量產">量產</option>
                        <option value="上市">上市</option>
                        <!-- 專案階段 -->
                        <option value="現勘">現勘</option>
                        <option value="討論">討論</option>
                        <option value="報價">報價</option>
                        <option value="執行">執行</option>
                        <option value="結案">結案</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">總專案數</div>
                <div class="stat-value" style="color: var(--primary);" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">進行中</div>
                <div class="stat-value" style="color: var(--warning);" id="ongoingCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">已上市</div>
                <div class="stat-value" style="color: var(--success);" id="completedCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">緊急項目</div>
                <div class="stat-value" style="color: var(--danger);" id="urgentCount">0</div>
            </div>
        </div>

        <div id="ownerTracker" class="owner-tracker" style="display:none;"></div>

        <div id="productsContainer">
            <div class="empty-state">
                <div class="empty-state-icon">
                    <div class="loading"></div>
                </div>
                <h3>載入資料中...</h3>
                <p>正在從 Google Sheets 讀取產品資料</p>
            </div>
        </div>
    </div>

    <script>
        // ========================================
        // 安全工具函數
        // ========================================
        
        // 1. HTML 轉義（防止 XSS 攻擊）
        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 2. URL 驗證
        function isValidUrl(url) {
            try {
                const parsedUrl = new URL(url);
                return parsedUrl.protocol === 'https:';
            } catch {
                return false;
            }
        }
        
        // 3. 請求限流器（防止 API 濫用）
        class RateLimiter {
            constructor(maxRequests = 10, windowMs = 60000) {
                this.maxRequests = maxRequests;
                this.windowMs = windowMs;
                this.requests = [];
            }
            
            canMakeRequest() {
                const now = Date.now();
                this.requests = this.requests.filter(time => now - time < this.windowMs);
                
                if (this.requests.length >= this.maxRequests) {
                    const remainingTime = Math.ceil(this.getRemainingTime() / 1000);
                    console.warn(`⚠️ API 請求過於頻繁，請等待 ${remainingTime} 秒後重試`);
                    return false;
                }
                
                this.requests.push(now);
                return true;
            }
            
            getRemainingTime() {
                if (this.requests.length === 0) return 0;
                const oldestRequest = Math.min(...this.requests);
                return Math.max(0, this.windowMs - (Date.now() - oldestRequest));
            }
        }
        
        // 4. CSS 顏色值驗證（防止 CSS Injection）
        function sanitizeCssColor(color) {
            if (!color) return '#999999';
            const c = color.trim();
            if (/^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(c)) return c;
            if (/^rgb\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*\)$/.test(c)) return c;
            if (/^rgba\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*(0|1|0?\.\d+)\s*\)$/.test(c)) return c;
            console.warn('⚠️ 不合法的顏色值已被封鎖:', color);
            return '#999999';
        }

        // 5. 安全的圖片 URL 處理
        function sanitizeImageUrl(url) {
            if (!url || url.trim() === '') {
                return 'https://via.placeholder.com/80?text=No+Image';
            }
            
            // 只允許 HTTPS 圖片
            if (!isValidUrl(url)) {
                console.warn('⚠️ 不安全的圖片 URL 已被封鎖:', url);
                return 'https://via.placeholder.com/80?text=Invalid+URL';
            }
            
            return url;
        }
        
        // ========================================
        // 應用程式主體
        // ========================================
        
        let productsData = [];
        let dataSource = 'google';
        
        // 初始化請求限流器（每分鐘最多 10 次請求）
        const apiLimiter = new RateLimiter(10, 60000);
        
        // Google Apps Script 部署網址（從環境變數讀取或使用預設值）
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzGOvv2bbZZBJonKD7gHvxMNQU9LVjUL0uqfVzk5HQgz_RMM8REwXOR3yFViEXrXcsL/exec';

        const statusColors = {
            '研發': '#b8860b',
            '樣品': '#c9a227',
            '洽詢': '#8a7a6a',
            '發售': '#1a5580',
            '停產': '#5a4a3a',
            '暫停出貨': '#7a6a5a'
        };

        const OWNER_INFO = {
            '陳慶文': { en: 'Sun'    },
            '吳家豪': { en: 'Howard' },
            '陳建安': { en: 'Jason'  },
            '游尚明': { en: 'Cony'   },
            '嚴清宇': { en: 'Chris'  },
            '陳俊廷': { en: 'Tim'    },
        };

        // 定義不同類別的階段
        const productStages = ['規劃', '研發', '驗証', '量產', '上市'];
        const projectStages = ['現勘', '討論', '報價', '執行', '結案'];
        
        // 根據產品名稱獲取對應的階段（如果產品名稱是"專案"，則使用專案階段）
        function getStagesForCategory(category, productName) {
            return (productName === '專案') ? projectStages : productStages;
        }
        
        // 為了向後兼容，保留 stages 變數（預設為產品階段）
        const stages = productStages;

        window.addEventListener('DOMContentLoaded', function() {
            // 先顯示介面，資料載入設為異步
            console.log('📱 頁面載入完成，準備載入資料...');
            
            // 檢查 XLSX 函式庫是否已載入（但不阻塞）
            if (typeof XLSX === 'undefined') {
                console.warn('⚠️ XLSX 函式庫尚未載入，Excel 上傳功能暫時無法使用');
            } else {
                console.log('✅ XLSX 函式庫載入成功');
            }
            
            // 使用 setTimeout 讓頁面先渲染，然後異步載入資料
            setTimeout(function() {
                loadGoogleSheets();
            }, 100); // 延遲 100ms，讓頁面先顯示
        });

        function updateSourceIndicator(source) {
            const indicator = document.getElementById('sourceIndicator');
            
            if (source === 'google') {
                indicator.textContent = 'Google Sheets (自動同步)';
                indicator.className = 'source-badge source-google';
            } else if (source === 'excel') {
                indicator.textContent = 'Excel 檔案';
                indicator.className = 'source-badge source-excel';
            } else {
                indicator.textContent = '載入中...';
                indicator.className = 'source-badge';
            }
        }

        function loadGoogleSheets() {
            if (dataSource !== 'google') return;
            
            // 檢查請求限流
            if (!apiLimiter.canMakeRequest()) {
                const remainingTime = Math.ceil(apiLimiter.getRemainingTime() / 1000);
                showError(`
                    <strong>請求過於頻繁</strong><br><br>
                    為了保護系統安全，請等待 ${remainingTime} 秒後再試。<br><br>
                    如需立即查看資料，請使用「上傳 Excel 檔案」功能。
                `);
                return;
            }
            
            updateSourceIndicator('loading');
            
            // 顯示載入中的提示（不阻塞頁面）
            const container = document.getElementById('productsContainer');
            if (container) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⏳</div>
                        <h3>正在載入資料...</h3>
                        <p>從 Google Sheets 讀取資料中，請稍候</p>
                    </div>
                `;
            }
            
            // 添加 origin 參數進行來源驗證
            const apiUrl = APPS_SCRIPT_URL + '?origin=' + encodeURIComponent(window.location.origin);
            
            // 添加超時控制（30秒）
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            
            fetch(apiUrl, { 
                signal: controller.signal,
                cache: 'no-cache' // 避免快取導致的延遲
            })
                .then(response => {
                    clearTimeout(timeoutId);
                    if (!response.ok) {
                        throw new Error('無法連接到 Google Sheets (HTTP ' + response.status + ')');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.error) {
                        throw new Error(data.error);
                    }

                    productsData = data.map(row => ({
                        id: row['產品編號'] || '',
                        name: row['產品名稱'] || '',
                        category: row['產品類別'] || '',
                        image: row['產品圖片網址'] || 'https://via.placeholder.com/80',
                        description: row['產品描述'] || '',
                        priority: row['優先權'] || '一般',
                        status: row['供貨狀態'] || '',
                        releaseDate: row['預計上市時間'] || '',
                        stage: row['開發階段'] || '規劃',
                        owner1: row['負責人1'] || '',
                        owner1Color: row['負責人1顏色'] || '#33FF57',
                        owner2: row['負責人2'] || '',
                        owner2Color: row['負責人2顏色'] || '#33A1FF',
                        owner3: row['負責人3'] || '',
                        owner3Color: row['負責人3顏色'] || '#FFBD33',
                        history: row['專案歷程'] || '',
                        lastUpdate: row['最後更新日期'] || ''
                    }));
                    
                    console.log('✅ 成功載入', productsData.length, '筆資料');
                    updateSourceIndicator('google');
                    updateCategoryFilter();
                    renderProducts();
                    updateStats();
                    updateOwnerTracker();
                })
                .catch(error => {
                    clearTimeout(timeoutId);
                    console.error('❌ Google Sheets 載入失敗:', error);
                    
                    let errorMessage = error.message;
                    if (error.name === 'AbortError') {
                        errorMessage = '載入超時（超過 30 秒）';
                    }
                    
                    showError(`
                        <strong>無法連接到 Google Sheets</strong><br><br>
                        錯誤訊息: ${escapeHtml(errorMessage)}<br><br>
                        請點擊上方「上傳 Excel 檔案」按鈕使用本地檔案
                    `);
                });
        }

        function reloadGoogleSheets() {
            if (dataSource === 'excel') {
                if (confirm('目前使用 Excel 檔案資料，重新載入將切換回 Google Sheets 資料源。是否繼續？')) {
                    dataSource = 'google';
                    loadGoogleSheets();
                }
            } else {
                loadGoogleSheets();
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 檢查 XLSX 函式庫是否已載入
            if (typeof XLSX === 'undefined') {
                alert('檔案解析失敗！\n\n錯誤訊息：XLSX 函式庫未載入\n\n請確認：\n1. 網路連線正常\n2. 重新整理頁面後再試\n3. 如果問題持續，請聯繫技術支援');
                event.target.value = '';
                return;
            }

            // 驗證檔案類型
            const validExtensions = ['.xlsx', '.xls'];
            const fileName = file.name.toLowerCase();
            const isValidType = validExtensions.some(ext => fileName.endsWith(ext));
            
            if (!isValidType) {
                alert('檔案格式錯誤！請上傳 Excel 檔案 (.xlsx 或 .xls)');
                event.target.value = '';
                return;
            }

            dataSource = 'excel';
            updateSourceIndicator('excel');

            const reader = new FileReader();
            reader.onerror = function() {
                alert('檔案讀取失敗！請確認檔案沒有損壞並重試。');
                event.target.value = '';
            };
            
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    // 檢查工作表是否存在
                    if (!workbook.SheetNames || workbook.SheetNames.length === 0) {
                        throw new Error('Excel 檔案中沒有找到工作表');
                    }
                    
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    if (!firstSheet) {
                        throw new Error('無法讀取工作表：' + workbook.SheetNames[0]);
                    }
                    
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                    
                    // 檢查是否有資料
                    if (!jsonData || jsonData.length === 0) {
                        throw new Error('Excel 檔案中沒有資料');
                    }
                    
                    // 驗證必要欄位
                    const requiredColumns = ['產品名稱', '產品類別', '開發階段'];
                    const firstRow = jsonData[0];
                    const missingColumns = requiredColumns.filter(col => !(col in firstRow));
                    
                    if (missingColumns.length > 0) {
                        throw new Error('Excel 檔案缺少必要欄位：' + missingColumns.join('、') + 
                            '\n\n請確認使用正確的範本格式。');
                    }
                    
                    productsData = jsonData.map(row => ({
                        id: row['產品編號'] || '',
                        name: row['產品名稱'] || '',
                        category: row['產品類別'] || '',
                        image: row['產品圖片網址'] || 'https://via.placeholder.com/80',
                        description: row['產品描述'] || '',
                        priority: row['優先權'] || '一般',
                        status: row['供貨狀態'] || '',
                        releaseDate: row['預計上市時間'] || '',
                        stage: row['開發階段'] || '規劃',
                        owner1: row['負責人1'] || '',
                        owner1Color: row['負責人1顏色'] || '#33FF57',
                        owner2: row['負責人2'] || '',
                        owner2Color: row['負責人2顏色'] || '#33A1FF',
                        owner3: row['負責人3'] || '',
                        owner3Color: row['負責人3顏色'] || '#FFBD33',
                        history: row['專案歷程'] || '',
                        lastUpdate: row['最後更新日期'] || ''
                    }));

                    updateCategoryFilter();
                    renderProducts();
                    updateStats();
                    updateOwnerTracker();

                    console.log('✅ Excel 檔案載入成功，共 ' + productsData.length + ' 筆資料');
                    
                } catch (error) {
                    console.error('Excel 解析錯誤:', error);
                    alert('檔案解析失敗！\n\n錯誤訊息：' + error.message + 
                        '\n\n請確認：\n1. 檔案格式正確（.xlsx 或 .xls）\n2. 檔案沒有密碼保護\n3. 包含必要的欄位（產品名稱、產品類別、開發階段）');
                    event.target.value = '';
                    dataSource = 'google';
                    updateSourceIndicator('google');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function showError(message) {
            document.getElementById('productsContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <h3>載入失敗</h3>
                    <div style="text-align: left; max-width: 600px; margin: 0 auto;">
                        <p>${message}</p>
                    </div>
                </div>
            `;
        }

        function updateCategoryFilter() {
            const categories = [...new Set(productsData.map(p => p.category))].filter(Boolean);
            const select = document.getElementById('categoryFilter');
            const currentValue = select.value;
            select.innerHTML = '<option value="">全部類別</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
            select.value = currentValue;
        }

        function renderProducts() {
            const categoryFilter = document.getElementById('categoryFilter').value;
            const progressFilter = document.getElementById('progressFilter').value;
            const priorityFilter = document.getElementById('priorityFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const stageFilter = document.getElementById('stageFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let filtered = productsData.filter(p => {
                const matchCategory = !categoryFilter || p.category === categoryFilter;
                
                // 進度篩選邏輯（支援產品和專案）
                let matchProgress = true;
                if (progressFilter === '進行中') {
                    const currentStages = getStagesForCategory(p.category, p.name);
                    const stageIndex = currentStages.indexOf(p.stage);
                    // 只要不是最後一個階段，就算進行中
                    matchProgress = stageIndex >= 0 && stageIndex < currentStages.length - 1;
                } else if (progressFilter === '已上市') {
                    const currentStages = getStagesForCategory(p.category, p.name);
                    const lastStage = currentStages[currentStages.length - 1];
                    matchProgress = p.stage === lastStage;
                }
                
                const matchPriority = !priorityFilter || p.priority === priorityFilter;
                const matchStatus = !statusFilter || p.status === statusFilter;
                const matchStage = !stageFilter || p.stage === stageFilter;
                const matchSearch = !searchTerm || 
                    p.id.toLowerCase().includes(searchTerm) || 
                    p.name.toLowerCase().includes(searchTerm) ||
                    p.description.toLowerCase().includes(searchTerm);
                return matchCategory && matchProgress && matchPriority && matchStatus && matchStage && matchSearch;
            });

            if (filtered.length === 0) {
                document.getElementById('productsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <h3>沒有找到符合條件的產品</h3>
                        <p>請調整篩選條件或搜尋關鍵字</p>
                    </div>
                `;
                return;
            }

            const grouped = {};
            filtered.forEach(product => {
                const cat = product.category || '其他';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(product);
            });

            let html = '';
            Object.keys(grouped).forEach(category => {
                html += `
                    <div class="category-section">
                        <div class="category-header">
                            <h2>${escapeHtml(category)}</h2>
                        </div>
                        <div class="cards-grid">
                            ${grouped[category].map(p => createProductCard(p, category)).join('')}
                        </div>
                    </div>
                `;
            });

            document.getElementById('productsContainer').innerHTML = html;
        }

        function createProductCard(product, category = '') {
            // 根據產品名稱決定使用哪組階段
            const currentStages = getStagesForCategory(product.category, product.name);
            const stageIndex = currentStages.indexOf(product.stage);
            const progressPercent = stageIndex >= 0 ? ((stageIndex + 1) / currentStages.length) * 100 : 0;
            const isWeeklyWorkSection = /本周工作|本週工作/.test(String(category));
            const progressSectionClassAttr = isWeeklyWorkSection ? '' : ' class="progress-section"';
            const progressBarContainerClassAttr = isWeeklyWorkSection ? '' : ' class="progress-bar-container"';
            const progressTrackClassAttr = isWeeklyWorkSection ? '' : ' class="progress-track"';
            const progressFillClassAttr = isWeeklyWorkSection ? '' : ' class="progress-fill"';
            const progressNodesClassAttr = isWeeklyWorkSection ? '' : ' class="progress-nodes"';
            const progressNodeClassAttr = isWeeklyWorkSection ? '' : ' class="progress-node"';

            const owners = [];
            if (product.owner1) owners.push({ name: product.owner1, color: product.owner1Color });
            if (product.owner2) owners.push({ name: product.owner2, color: product.owner2Color });
            if (product.owner3) owners.push({ name: product.owner3, color: product.owner3Color });

            const historyItems = product.history ? product.history.split(/\n/).filter(h => h.trim()) : [];

            // 使用 escapeHtml 防止 XSS 攻擊
            const safeImageUrl = sanitizeImageUrl(product.image);
            const safeId = escapeHtml(product.id);
            const safeName = escapeHtml(product.name);
            const safeDescription = escapeHtml(product.description);
            const safePriority = escapeHtml(product.priority);
            const safeStatus = escapeHtml(product.status);
            const safeReleaseDate = escapeHtml(product.releaseDate);

            return `
                <div class="product-card">
                    <div class="card-header">
                        <img src="${safeImageUrl}" alt="${safeName}" class="product-image" 
                             onerror="this.src='https://via.placeholder.com/80?text=No+Image'">
                        <div class="product-info">
                            <div class="product-title">${safeName}</div>
                            ${safeId ? `<div style="font-size:1.05rem; color:var(--gray-600); font-weight:700; font-family:'Space Mono',monospace; margin-bottom:0.4rem;">${safeId}</div>` : ''}
                            <div class="product-desc">${safeDescription}</div>
                            <div class="status-row">
                                <span class="priority-tag priority-${safePriority}">${safePriority}</span>
                                <div class="status-badge">
                                    <span class="status-dot" style="background: ${statusColors[product.status] || '#999'}"></span>
                                    <span>${safeStatus}</span>
                                </div>
                                ${product.releaseDate ? `<span class="release-date">📅 ${safeReleaseDate}</span>` : ''}
                            </div>
                            ${owners.length > 0 ? `
                                <div class="owner-badges">
                                    ${owners.map(o => {
                                        const safeName = escapeHtml(o.name);
                                        const safeColor = sanitizeCssColor(o.color);
                                        return `
                                        <div class="owner-badge" style="background: ${safeColor}" title="${safeName}">
                                            ${escapeHtml(getInitials(o.name))}
                                        </div>
                                    `;
                                    }).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    <div${progressSectionClassAttr}>
                        <div${progressBarContainerClassAttr}>
                            <div${progressTrackClassAttr}></div>
                            <div${progressFillClassAttr} style="width: ${progressPercent}%"></div>
                            ${isWeeklyWorkSection ? '' : `
                            <div${progressNodesClassAttr}>
                                ${currentStages.map((stage, i) => {
                                    const safeStage = escapeHtml(stage);
                                    const nodeDotClassAttr = ` class="node-dot ${i <= stageIndex ? 'active' : ''}"`;
                                    const nodeLabelClassAttr = ` class="node-label ${i <= stageIndex ? 'active' : ''}"`;
                                    return `
                                    <div${progressNodeClassAttr}>
                                        <div${nodeDotClassAttr}></div>
                                        <span${nodeLabelClassAttr}>${safeStage}</span>
                                    </div>
                                `;
                                }).join('')}
                            </div>
                            `}
                        </div>
                    </div>
                    ${historyItems.length > 0 ? `
                        <div class="history-section">
                            ${historyItems.map(item => `<div class="history-item">${escapeHtml(item)}</div>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function getInitials(name) {
            if (!name) return '';
            const parts = name.split('');
            if (parts.length >= 2) {
                return parts[parts.length - 2] + parts[parts.length - 1];
            }
            return name.substring(0, 2);
        }

        function filterProducts() {
            renderProducts();
            updateStats();
        }

        function updateStats() {
            const total = productsData.length;
            
            // 進行中的判斷：產品類別的前4個階段，或專案類別的前4個階段
            const ongoing = productsData.filter(p => {
                const currentStages = getStagesForCategory(p.category, p.name);
                const stageIndex = currentStages.indexOf(p.stage);
                // 只要不是最後一個階段，就算進行中
                return stageIndex >= 0 && stageIndex < currentStages.length - 1;
            }).length;
            
            // 已完成的判斷：產品的「上市」或專案的「結案」
            const completed = productsData.filter(p => {
                const currentStages = getStagesForCategory(p.category, p.name);
                const lastStage = currentStages[currentStages.length - 1];
                return p.stage === lastStage;
            }).length;
            
            const urgent = productsData.filter(p => p.priority === '緊急').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('ongoingCount').textContent = ongoing;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('urgentCount').textContent = urgent;
        }

        function parseDate(value) {
            if (!value) return null;
            let d;
            if (typeof value === 'string') {
                d = new Date(value);
            } else if (value instanceof Date) {
                d = value;
            } else if (typeof value === 'number') {
                d = new Date((value - 25569) * 86400 * 1000);
            }
            return (d && !isNaN(d.getTime())) ? d : null;
        }

        function updateOwnerTracker() {
            const container = document.getElementById('ownerTracker');
            if (!container) return;

            // 彙整每位負責人1的最新更新日期
            const ownerMap = {};
            productsData.forEach(p => {
                if (!p.owner1) return;
                const d = parseDate(p.lastUpdate);
                if (!d) return;
                if (!ownerMap[p.owner1] || d > ownerMap[p.owner1].date) {
                    ownerMap[p.owner1] = { date: d, color: p.owner1Color || '#6b7280' };
                }
            });

            const entries = Object.entries(ownerMap);
            if (entries.length === 0) {
                container.style.display = 'none';
                return;
            }

            // 依更新日期由舊到新排序（最久未更新的排最前面）
            entries.sort((a, b) => a[1].date - b[1].date);

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let cards = '';
            entries.forEach(([name, info]) => {
                const days = Math.floor((today - info.date) / 86400000);
                const dateStr = `${info.date.getFullYear()}/${String(info.date.getMonth() + 1).padStart(2, '0')}/${String(info.date.getDate()).padStart(2, '0')}`;

                let borderColor, pillBg, pillColor;
                if (days <= 14) {
                    borderColor = 'var(--success)';
                    pillBg = '#d1fae5'; pillColor = '#065f46';
                } else if (days <= 30) {
                    borderColor = 'var(--warning)';
                    pillBg = '#fef3c7'; pillColor = '#92400e';
                } else {
                    borderColor = 'var(--danger)';
                    pillBg = '#fee2e2'; pillColor = '#991b1b';
                }

                const safeName = escapeHtml(name);
                const safeColor = sanitizeCssColor(info.color);
                const initials = escapeHtml(getInitials(name));

                cards += `
                    <div class="owner-update-card" data-owner="${safeName}" style="border-left-color:${borderColor}">
                        <div class="owner-update-avatar" style="background:${safeColor}">${initials}</div>
                        <div>
                            <div class="owner-update-name">${safeName}</div>
                            <div class="owner-update-date">${dateStr}</div>
                        </div>
                        <div class="owner-update-days" style="background:${pillBg};color:${pillColor}">${days} 天前</div>
                    </div>`;
            });

            container.style.display = 'block';
            container.innerHTML = `
                <div class="owner-tracker-title">📋 負責人更新狀態（由舊到新）</div>
                <div class="owner-cards-row">${cards}</div>`;

            // 綁定 tooltip 事件
            container.querySelectorAll('.owner-update-card').forEach(card => {
                const ownerName = card.dataset.owner;
                card.addEventListener('mouseenter', e => _showOwnerTip(ownerName, e.clientX, e.clientY));
                card.addEventListener('mousemove',  e => _moveOwnerTip(e.clientX, e.clientY));
                card.addEventListener('mouseleave', _hideOwnerTip);
            });
        }

        function _initOwnerTip() {
            if (document.getElementById('ownerTooltip')) return;
            const el = document.createElement('div');
            el.id = 'ownerTooltip';
            el.className = 'owner-tooltip';
            document.body.appendChild(el);
        }

        function _showOwnerTip(name, x, y) {
            _initOwnerTip();
            const info = OWNER_INFO[name];
            if (!info) return;
            const tip = document.getElementById('ownerTooltip');
            tip.innerHTML = `
                <div class="owner-tooltip-name">
                    ${escapeHtml(info.en)}
                    <span style="color:var(--gray-600);font-weight:500;font-size:0.82rem;">／ ${escapeHtml(name)}</span>
                </div>`;
            _moveOwnerTip(x, y);
            tip.classList.add('visible');
        }

        function _moveOwnerTip(x, y) {
            const tip = document.getElementById('ownerTooltip');
            if (!tip) return;
            const tw = tip.offsetWidth  || 220;
            const th = tip.offsetHeight || 100;
            tip.style.left = (x + 16 + tw > window.innerWidth  ? x - tw - 8 : x + 16) + 'px';
            tip.style.top  = (y + 16 + th > window.innerHeight ? y - th - 8 : y + 16) + 'px';
        }

        function _hideOwnerTip() {
            const tip = document.getElementById('ownerTooltip');
            if (tip) tip.classList.remove('visible');
        }

        function downloadTemplate() {
            window.open('產品開發進度追蹤_RD9.xlsx', '_blank');
        }
    </script>
